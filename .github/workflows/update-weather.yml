name: Update Weather Data

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # リポジトリをチェックアウト
      - uses: actions/checkout@v6

      # Node.js + pnpm + vp のセットアップを一括で行う
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      # 依存関係インストール
      - run: vp install

      # ダムデータを都道府県別に分割（public/data/dams/）
      - run: vp dlx tsx scripts/split-dams.ts

      # 天気データ取得
      - id: fetch-weather
        run: vp dlx tsx scripts/fetch-weather.ts

      # ダム貯水率データ取得
      - id: fetch-storage
        continue-on-error: true
        run: vp dlx tsx scripts/fetch-dam-storage.ts

      # サイトマップ生成 + 型チェック + ビルド（天気データ取得成功時のみ実行）
      - if: success()
        run: |
          vp dlx tsx scripts/generate-sitemap.ts
          vp exec tsc -b
          vp build

      # Cloudflare Pages へデプロイ（天気データ取得成功時のみ実行）
      - if: success()
        run: vp exec wrangler pages deploy dist --project-name=japan-dam-weather
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
